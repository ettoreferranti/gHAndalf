# Mutation-testing configuration (mutmut 2.x reads this file).
#
# We point it at the pure-logic modules only: deterministic functions with no
# Home Assistant runtime, which are the ideal targets. mutmut makes small edits
# ("mutants") to this code and re-runs the tests; a mutant that survives means a
# test was missing or too weak. Run with:  mutmut run   then:  mutmut results
[mutmut]
# models.py is intentionally excluded for now: it is dataclass/enum *structure*,
# not behaviour, and its not-yet-used enum values would surface as equivalent
# mutants until the pillar-2 rules exercise them. Re-add it then.
paths_to_mutate=custom_components/ghandalf/helpers.py,custom_components/ghandalf/rules.py,custom_components/ghandalf/nudge_gate.py
runner=python -m pytest -x -q tests/test_helpers.py tests/test_rules.py tests/test_nudge_gate.py
tests_dir=tests/
